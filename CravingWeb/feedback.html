<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>feedback</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
  </head>
  <body>
    <header>
      <div class="d-flex justify-content-between">
        <a class="navbar-brand" href="home.html">
          <img
            src="../CravingWeb/pics/transparentLogoLight-De2Z7I01.png"
            alt="CravingWeb Logo"
            style="width: 100 px"
          />
        </a>

        <div class="d-flex m-3 pe-5">
          <button id="login" onclick="window.location.href = 'login.html'">
            login
          </button>
          <button
            id="Register"
            onclick="window.location.href = 'register.html'"
          >
            Register
          </button>
        </div>
      </div>
    </header>
    <!-- .... -->
    <main>
      <div class="feedback d-flex justify-content-end p-5">
        <div
          class="col-4 bg-white text-black p-4 rounded-3 d-flex align-items-center border m-4"
        >
          <div class="w-100 d-flex flex-column gap-2">
            <div class="text-center">
              <h2 class="text-danger"><b>Share Feedback</b></h2>
              <p>Help us improve your Cravings experience</p>
            </div>

            <div class="border-secondary d-flex gap-1">
              <input
                type="text"
                class="form-control"
                placeholder="Enter Your name"
              />
            </div>

            <div class="border-secondary d-flex gap-3">
              <input
                type="email"
                class="form-control"
                placeholder="Enter Your Email"
              />
            </div>
            <div>
              <label for="feedback-category">Feedback Category:</label>
              <button class="w-100 border-0">
                <select
                  class="w-100 p-2 rounded-3 border"
                  id="feedback-category"
                  name="feedback-category"
                >
                  <option value="" selected>Select a category</option>
                  <option value="food">Food Quality</option>
                  <option value="delivery">Delivery Experience</option>
                  <option value="app">App & Website</option>
                  <option value="support">Customer Support</option>
                  <option value="pricing">Pricing & Value</option>
                </select>
              </button>
            </div>
            <div>
              <label for="rating">Overall Rating:</label>
              <div class="stars">
                <span class="display-5" style="color: lightgrey;" >&#9733;</span>
                <span class="display-5" style="color: lightgrey;" >&#9733;</span>
                <span class="display-5" style="color: lightgrey;" >&#9733;</span>
                <span class="display-5" style="color: lightgrey;" >&#9733;</span>
                <span class="display-5" style="color: lightgrey;" >&#9733;</span>
                
              </div>
              <input type="hidden" name="rating" id="rating" />
            </div>
            <label for="feedback">Your Feedback:</label>
            <textarea
            class="border"
              id="feedback"
              name="feedback"
              rows="4"
              cols="50"
              placeholder="Tell us about your experience…"
              required
            ></textarea>

            

            <button class="Explore p-2 rounded-3">Feedback Submit</button>
          </div>
        </div>
      </div>
    </main>
    <!-- .... -->
    <div
      class="d-flex justify-content-center"
      style="background-color: #3f3f46"
    >
      <div class="p-5">
        <div class="text-center m-4">
          <h5 class="text-white">
            --- Your favorite food delivery platform connecting customers with
            restaurants and riders. --
          </h5>
        </div>
        <div class="d-flex justify-content-center">
          <div class="w-25">
            <img
              src="../CravingWeb/pics/footerpic.jpeg"
              alt=""
              class="w-50 rounded-circle"
            />
          </div>
          <div class="">
            <div class="p-5">
              <h4 class="text-white">Quick Links</h4>
              <div>
                <button class="border-0 bg-transparent text-white">Home</button>
              </div>
              <div>
                <button class="border-0 bg-transparent text-white">
                  About
                </button>
              </div>
              <div>
                <button class="border-0 bg-transparent text-white">
                  Oder Now
                </button>
              </div>
            </div>
          </div>
          <div class="p-5">
            <div>
              <h4 class="text-white">Quick Links</h4>
              <div>
                <button class="border-0 bg-transparent text-white">Home</button>
              </div>
              <div>
                <button class="border-0 bg-transparent text-white">
                  About
                </button>
              </div>
              <div>
                <button class="border-0 bg-transparent text-white">
                  Oder Now
                </button>
              </div>
            </div>
          </div>
          <div class="p-5">
            <div>
              <h4 class="text-white">For Riders</h4>
              <div>
                <button class="border-0 bg-transparent text-white">
                  Become a Rider
                </button>
              </div>
              <div>
                <button class="border-0 bg-transparent text-white">
                  Rider Dashboard
                </button>
              </div>
            </div>
          </div>
          <div class="p-5">
            <div>
              <h4 class="text-white">Feedback & Support</h4>
              <div>
                <button class="border-0 bg-transparent text-white">
                  Submit Feedback
                </button>
              </div>
              <div>
                <button class="border-0 bg-transparent text-white">
                  Help Center
                </button>
              </div>
              <div>
                <button class="border-0 bg-transparent text-white">
                  Contact Us
                </button>
              </div>
            </div>
          </div>
        </div>
        <hr class="text-white" />
        <div class="d-flex justify-content-between p-3">
          <div class="text-white">© 2026 Cravings. All rights reserved</div>
          <div class="d-flex">
            <div>
              <button class="border-0 bg-transparent p-1 text-white">
                Privacy Policy
              </button>
            </div>
            <div>
              <button class="border-0 bg-transparent p-1 text-white">
                Terms of Service
              </button>
            </div>
            <div>
              <button class="border-0 bg-transparent m-1 text-white">
                Site Map
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
